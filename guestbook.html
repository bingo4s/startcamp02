<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="개발자 이상은 방명록">
  <title>이상은 | 방명록</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Pretendard','sans-serif']},colors:{primary:'#2563eb'}}}}</script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen bg-[#fcfcfc] font-sans text-slate-900 antialiased">
  <button data-theme-toggle aria-pressed="false" class="fixed bottom-6 right-6 z-40 rounded-full border border-slate-200 bg-white px-4 py-3 text-sm font-bold shadow-lg transition hover:-translate-y-1 hover:border-primary hover:text-primary" title="색상 모드 전환">◐ <span data-theme-label>다크 모드</span></button>
  <nav class="fixed inset-x-0 top-0 z-50 border-b border-slate-200 bg-white/90 backdrop-blur-lg" aria-label="주요 메뉴">
    <div class="mx-auto flex h-20 max-w-6xl items-center justify-between px-6 lg:px-8">
      <a href="index.html" class="text-2xl font-extrabold tracking-tighter"><span class="text-primary">I AM</span>.</a>
      <div class="hidden items-center gap-10 md:flex">
        <a href="index.html" class="py-2 text-sm font-bold text-slate-600 transition hover:text-primary">HOME</a>
        <a href="goals.html" class="py-2 text-sm font-bold text-slate-600 transition hover:text-primary">목표</a>
        <a href="experience.html" class="py-2 text-sm font-bold text-slate-600 transition hover:text-primary">경험</a>
      </div>
      <button data-menu-button aria-expanded="false" aria-controls="mobile-menu" aria-label="메뉴 열기" class="rounded-lg p-2 md:hidden"><span class="block h-0.5 w-6 bg-current"></span><span class="mt-1.5 block h-0.5 w-6 bg-current"></span><span class="mt-1.5 block h-0.5 w-6 bg-current"></span></button>
    </div>
    <div id="mobile-menu" data-mobile-menu class="hidden border-t border-slate-200 bg-white px-6 py-4 md:hidden"><div class="mx-auto flex max-w-6xl flex-col gap-3"><a href="index.html" class="font-semibold">HOME</a><a href="goals.html" class="font-semibold">목표</a><a href="experience.html" class="font-semibold">경험</a></div></div>
  </nav>
  <main class="page-enter mx-auto max-w-6xl px-6 pb-24 pt-36 lg:px-8">
    <header class="mb-12 text-center"><p class="mb-3 font-bold tracking-widest text-primary">GUESTBOOK</p><h1 class="text-4xl font-black tracking-tight sm:text-6xl">한마디 남겨주세요</h1><p class="mt-5 text-lg text-slate-600">작성한 메시지는 현재 브라우저에만 저장됩니다.</p></header>
    <section class="mx-auto max-w-2xl rounded-[2rem] border border-slate-200 bg-white p-6 shadow-xl shadow-slate-200/50 sm:p-9" aria-label="방명록 작성 및 목록">
      <form data-guestbook-form class="space-y-4">
        <div><label for="guest-name" class="mb-2 block text-sm font-bold">이름</label><input id="guest-name" name="name" required maxlength="20" autocomplete="name" placeholder="이름을 입력하세요" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none transition focus:border-primary focus:ring-2 focus:ring-blue-100 dark:bg-slate-900"></div>
        <div><label for="guest-message" class="mb-2 block text-sm font-bold">메시지</label><textarea id="guest-message" name="message" required maxlength="200" rows="3" placeholder="응원의 메시지를 남겨주세요" class="w-full resize-none rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none transition focus:border-primary focus:ring-2 focus:ring-blue-100 dark:bg-slate-900"></textarea></div>
        <div class="flex items-center justify-between gap-4"><p data-guestbook-status class="text-sm text-slate-500" role="status" aria-live="polite"></p><button type="submit" class="shrink-0 rounded-full bg-primary px-6 py-3 font-bold text-white transition hover:-translate-y-0.5 hover:bg-blue-700">등록하기</button></div>
      </form>
      <div data-guestbook-list class="mt-8 space-y-3" aria-label="방명록 목록"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
